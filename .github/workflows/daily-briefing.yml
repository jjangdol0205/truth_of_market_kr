name: Daily Market Briefing

on:
  schedule:
    # Runs at 22:00 UTC (10:00 PM UTC), which is 07:00 AM KST
    # Monday to Friday
    - cron: '0 22 * * 1-5'
  # Allows triggering the workflow manually from GitHub UI
  workflow_dispatch:

jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Daily Market Summary Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          npx tsx scripts/daily_summary.ts
